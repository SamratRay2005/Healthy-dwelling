<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Healthy dwelling{% endblock %}</title>
  <meta name="description" content="{% block meta_desc %}Exploring consciousness, psychology, and the mysteries of the human mind.{% endblock %}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<!-- ── Navigation ─────────────────────────────────────────────────────────── -->
<header class="site-header">
  <div class="header-inner">
    <a href="{{ url_for('blog.index') }}" class="site-logo">
      <span class="logo-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="17" stroke="#c9a84c" stroke-width="1.2"/>
          <path d="M18 6C13.5 6 10 9.5 10 14c0 2.8 1.4 5.2 3.5 6.7V26h9v-5.3C24.6 19.2 26 16.8 26 14c0-4.5-3.5-8-8-8z" stroke="#c9a84c" stroke-width="1.2" fill="none"/>
          <line x1="18" y1="20" x2="18" y2="26" stroke="#c9a84c" stroke-width="1.2"/>
          <line x1="14" y1="17" x2="14" y2="22" stroke="#c9a84c" stroke-width="1" stroke-dasharray="1 2"/>
          <line x1="22" y1="17" x2="22" y2="22" stroke="#c9a84c" stroke-width="1" stroke-dasharray="1 2"/>
        </svg>
      </span>
      <span class="logo-text">Healthy dwelling</span>
    </a>

    <nav class="main-nav" id="main-nav">
      <a href="{{ url_for('blog.index') }}" class="nav-link {% if request.endpoint == 'blog.index' %}active{% endif %}">Home</a>
      <span class="nav-sep">|</span>
      <a href="{{ url_for('blog.blog') }}" class="nav-link {% if request.endpoint == 'blog.blog' %}active{% endif %}">Blog</a>
      <span class="nav-sep">|</span>
      <a href="{{ url_for('blog.categories') }}" class="nav-link {% if request.endpoint in ['blog.categories', 'blog.category'] %}active{% endif %}">Categories</a>
      <!-- <span class="nav-sep">|</span> -->
      <!-- <a href="#" class="nav-link">Resources</a> -->
      <!-- <span class="nav-sep">|</span> -->
      <!-- <a href="#" class="nav-link">About</a> -->
      <span class="nav-sep">|</span>
      <a href="{{ url_for('blog.search') }}" class="nav-link nav-search-link {% if request.endpoint == 'blog.search' %}active{% endif %}">
        Search
        <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="8" cy="8" r="6"/><path d="M14 14l4 4"/>
        </svg>
      </a>
    </nav>

    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- ── Page Content ───────────────────────────────────────────────────────── -->
<main class="site-main">
  {% block content %}{% endblock %}
</main>

<!-- ── Footer ────────────────────────────────────────────────────────────── -->
<footer class="site-footer">
  <div class="footer-inner">

      <a href="#" aria-label="Instagram" class="social-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>
      </a>
      <a href="#" aria-label="Twitter / X" class="social-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
      <a href="#" aria-label="Spotify" class="social-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 15.5c2.5-1 5.5-1 8 0M7 12c3-1.3 6.5-1.3 10 0M8.5 8.5c2.5-1 5.5-1 7 0"/></svg>
      </a>
    </div> -->
    <div class="footer-links">
      <!-- <a href="#">Contact</a> -->
      <!-- <span>|</span> -->
      <!-- <a href="#">Privacy Policy</a> -->
    </div>
  </div>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
